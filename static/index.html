<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모두의 창업 아이디어 뷰어</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>모두의 창업 아이디어 통계 분석</h1>
    <p id="meta">로딩 중...</p>
    <nav class="main-nav">
      <a href="/" class="nav-tab active">아이디어 목록</a>
      <a href="/analytics" class="nav-tab">Raw data 분석</a>
    </nav>
  </header>

  <div id="toast" class="toast hidden"></div>

  <main>
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="crawlBtn" class="btn btn-primary">
          <span class="btn-icon">&#x21bb;</span>
          <span id="crawlBtnText">최신 데이터 수집</span>
        </button>
      </div>
      <div class="toolbar-right">
        <a href="/api/export/json" class="btn btn-secondary" download>JSON 다운로드</a>
        <a href="/api/export/xlsx" class="btn btn-secondary" download>엑셀 다운로드</a>
      </div>
    </div>

    <section class="filter-panel" aria-label="조건 검색">
      <h2 class="filter-title">조건 검색 <span class="filter-hint">(분야정리 기준 세부분야)</span></h2>
      <div class="filter-row">
        <label class="filter-field">
          <span>대분야</span>
          <select id="divisionSelect">
            <option value="">전체</option>
          </select>
        </label>
        <label class="filter-field">
          <span>세부분야</span>
          <select id="subcategorySelect" disabled>
            <option value="">대분야를 선택하세요</option>
          </select>
        </label>
        <label class="filter-field filter-grow">
          <span>키워드</span>
          <input type="search" id="keywordInput" placeholder="요약·태그에 포함된 문자열" autocomplete="off">
        </label>
        <div class="filter-actions">
          <button type="button" id="searchBtn" class="btn btn-primary">검색</button>
          <button type="button" id="resetFilterBtn" class="btn btn-secondary">초기화</button>
        </div>
      </div>
      <p id="filterNote" class="filter-note hidden">
        세부분야는 API에서 직접 가져온 정확한 분류입니다.
      </p>
      <p id="filterResultCount" class="filter-result-count hidden"></p>
    </section>

    <div class="controls">
      <div class="pagination">
        <button id="firstBtn" title="처음">&#x21E4;</button>
        <button id="prevBtn" title="이전">&#x2190;</button>
        <span id="pageInfo">-</span>
        <button id="nextBtn" title="다음">&#x2192;</button>
        <button id="lastBtn" title="마지막">&#x21E5;</button>
      </div>
      <label class="page-size-label">
        페이지당
        <select id="pageSizeSelect">
          <option value="12" selected>12</option>
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
    </div>

    <div class="table-wrapper">
      <table id="ideasTable">
        <thead>
          <tr>
            <th>#</th>
            <th>아이디어</th>
            <th>분야</th>
            <th>세부분야</th>
            <th>도전자</th>
            <th>좋아요</th>
            <th>등록일</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="controls controls-bottom">
      <div class="pagination">
        <button id="firstBtn2" title="처음">&#x21E4;</button>
        <button id="prevBtn2" title="이전">&#x2190;</button>
        <span id="pageInfo2">-</span>
        <button id="nextBtn2" title="다음">&#x2192;</button>
        <button id="lastBtn2" title="마지막">&#x21E5;</button>
      </div>
    </div>
  </main>

  <footer>
    <p>데이터 출처: <a href="https://www.modoo.or.kr/idea/list" target="_blank">modoo.or.kr</a></p>
  </footer>

  <script>
    const API_META = '/api/meta';
    const API_IDEAS = '/api/ideas';
    const API_CRAWL = '/api/crawl';

    let currentPage = 1;
    let pageSize = 12;
    let totalPages = 1;
    let rawTotalAll = 0;
    let subcategoriesByDivision = {};
    let isCrawling = false;

    const metaEl = document.getElementById('meta');
    const divisionSelect = document.getElementById('divisionSelect');
    const subcategorySelect = document.getElementById('subcategorySelect');
    const keywordInput = document.getElementById('keywordInput');
    const searchBtn = document.getElementById('searchBtn');
    const resetFilterBtn = document.getElementById('resetFilterBtn');
    const filterNote = document.getElementById('filterNote');
    const filterResultCount = document.getElementById('filterResultCount');
    const tbody = document.querySelector('#ideasTable tbody');
    const pageSizeSelect = document.getElementById('pageSizeSelect');
    const crawlBtn = document.getElementById('crawlBtn');
    const crawlBtnText = document.getElementById('crawlBtnText');
    const toast = document.getElementById('toast');

    const pageInfo = document.getElementById('pageInfo');
    const pageInfo2 = document.getElementById('pageInfo2');
    const firstBtn = document.getElementById('firstBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const lastBtn = document.getElementById('lastBtn');
    const firstBtn2 = document.getElementById('firstBtn2');
    const prevBtn2 = document.getElementById('prevBtn2');
    const nextBtn2 = document.getElementById('nextBtn2');
    const lastBtn2 = document.getElementById('lastBtn2');

    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      setTimeout(() => { toast.className = 'toast hidden'; }, 4000);
    }

    function updateMetaLine(dataIdeas) {
      const date = window._crawledDate || '-';
      const base = rawTotalAll
        ? `전체 ${rawTotalAll.toLocaleString()}건 · 수집일: ${date}`
        : (metaEl.textContent || '');
      if (!dataIdeas || !dataIdeas.filters) {
        metaEl.textContent = base;
        return;
      }
      const f = dataIdeas.filters;
      const hasFilter = f.division || f.subcategory || f.q;
      if (hasFilter && typeof dataIdeas.raw_total === 'number') {
        const n = dataIdeas.total ?? 0;
        metaEl.textContent = `${base} · 조건 결과 ${n.toLocaleString()}건`;
      } else {
        metaEl.textContent = base;
      }
    }

    function updateFilterResultCount(dataIdeas) {
      const selectedSubcategory = subcategorySelect.value;
      if (!selectedSubcategory || !dataIdeas || typeof dataIdeas.total !== 'number') {
        filterResultCount.textContent = '';
        filterResultCount.classList.add('hidden');
        return;
      }
      filterResultCount.textContent = `세부분야 '${selectedSubcategory}' 검색 결과: ${dataIdeas.total.toLocaleString()}건`;
      filterResultCount.classList.remove('hidden');
    }

    function rebuildSubcategoryOptions() {
      const div = divisionSelect.value;
      subcategorySelect.innerHTML = '';
      const allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = '세부 전체';
      subcategorySelect.appendChild(allOpt);

      let options = [];
      if (div) {
        options = subcategoriesByDivision[div] || [];
      } else {
        // 대분야=전체일 때는 모든 세부분야를 합쳐 보여준다.
        const merged = [];
        for (const list of Object.values(subcategoriesByDivision)) {
          for (const name of list) {
            if (!merged.includes(name)) merged.push(name);
          }
        }
        options = merged;
      }

      if (!options.length) {
        subcategorySelect.disabled = true;
        allOpt.textContent = div ? '해당 대분야에 세부 목록 없음' : '세부 목록 없음';
        return;
      }

      subcategorySelect.disabled = false;
      for (const name of options) {
        const o = document.createElement('option');
        o.value = name;
        o.textContent = name;
        subcategorySelect.appendChild(o);
      }
    }

    async function loadMeta() {
      try {
        const res = await fetch(API_META);
        const data = await res.json();
        rawTotalAll = data.total || 0;
        window._crawledDate = data.crawled_at ? data.crawled_at.slice(0, 10) : '-';
        subcategoriesByDivision = data.subcategories || {};

        if (data.total) {
          metaEl.textContent = `전체 ${data.total.toLocaleString()}건 · 수집일: ${window._crawledDate}`;
        } else {
          metaEl.textContent = data.message || '데이터 없음';
        }

        const divisions = data.divisions || [];
        divisionSelect.innerHTML = '<option value="">전체</option>';
        for (const d of divisions) {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          divisionSelect.appendChild(opt);
        }
        rebuildSubcategoryOptions();
        filterNote.classList.toggle('hidden', !rawTotalAll);
      } catch {
        metaEl.textContent = '메타 정보 로드 실패';
      }
    }

    function ideasQueryParams() {
      const params = new URLSearchParams({
        page: String(currentPage),
        page_size: String(pageSize),
      });
      const div = divisionSelect.value;
      const sub = subcategorySelect.value;
      const kw = keywordInput.value.trim();
      if (div) params.set('division', div);
      if (sub) params.set('subcategory', sub);
      if (kw) params.set('q', kw);
      return params;
    }

    async function loadIdeas() {
      tbody.innerHTML = '<tr><td colspan="7" class="loading">로딩 중...</td></tr>';
      try {
        const res = await fetch(`${API_IDEAS}?${ideasQueryParams()}`);
        const data = await res.json();
        totalPages = data.total_pages || 1;
        currentPage = data.page || currentPage;
        renderTable(data.items);
        updateControls();
        updateMetaLine(data);
        updateFilterResultCount(data);
      } catch {
        tbody.innerHTML = '<tr><td colspan="7" class="error">데이터 로드 실패</td></tr>';
        updateFilterResultCount(null);
      }
    }

    function renderTable(items) {
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">표시할 데이터가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(i => `
        <tr>
          <td>${i.index}</td>
          <td class="summary">${escapeHtml(i.summary)}</td>
          <td><span class="badge ${badgeClass(i.division)}">${escapeHtml(i.division)}</span></td>
          <td class="subcategory">${escapeHtml(i.subcategory || '')}</td>
          <td>${escapeHtml(i.nickname)}</td>
          <td class="likes">&#x2665; ${i.likes}</td>
          <td class="date">${(i.created_at || '').slice(0, 10)}</td>
        </tr>
      `).join('');
    }

    function updateControls() {
      const info = `${currentPage} / ${totalPages}`;
      pageInfo.textContent = info;
      pageInfo2.textContent = info;

      const isFirst = currentPage <= 1;
      const isLast = currentPage >= totalPages;

      firstBtn.disabled = isFirst;
      prevBtn.disabled = isFirst;
      nextBtn.disabled = isLast;
      lastBtn.disabled = isLast;
      firstBtn2.disabled = isFirst;
      prevBtn2.disabled = isFirst;
      nextBtn2.disabled = isLast;
      lastBtn2.disabled = isLast;
    }

    function badgeClass(div) {
      if (div === '일반/기술') return 'badge-blue';
      if (div === '로컬') return 'badge-green';
      if (div === '사회적') return 'badge-purple';
      if (div === '그린') return 'badge-teal';
      if (div === '문화') return 'badge-orange';
      return 'badge-gray';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function goFirst() { currentPage = 1; loadIdeas(); }
    function goPrev() { if (currentPage > 1) { currentPage--; loadIdeas(); } }
    function goNext() { if (currentPage < totalPages) { currentPage++; loadIdeas(); } }
    function goLast() { currentPage = totalPages; loadIdeas(); }

    firstBtn.addEventListener('click', goFirst);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    lastBtn.addEventListener('click', goLast);
    firstBtn2.addEventListener('click', goFirst);
    prevBtn2.addEventListener('click', goPrev);
    nextBtn2.addEventListener('click', goNext);
    lastBtn2.addEventListener('click', goLast);

    pageSizeSelect.addEventListener('change', () => {
      pageSize = parseInt(pageSizeSelect.value, 10);
      currentPage = 1;
      loadIdeas();
    });

    divisionSelect.addEventListener('change', () => {
      rebuildSubcategoryOptions();
      currentPage = 1;
      loadIdeas();
    });

    subcategorySelect.addEventListener('change', () => {
      currentPage = 1;
      loadIdeas();
    });

    keywordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        currentPage = 1;
        loadIdeas();
      }
    });

    searchBtn.addEventListener('click', () => {
      currentPage = 1;
      loadIdeas();
    });

    resetFilterBtn.addEventListener('click', () => {
      divisionSelect.value = '';
      keywordInput.value = '';
      rebuildSubcategoryOptions();
      updateFilterResultCount(null);
      currentPage = 1;
      loadIdeas();
      const date = window._crawledDate || '-';
      if (rawTotalAll) {
        metaEl.textContent = `전체 ${rawTotalAll.toLocaleString()}건 · 수집일: ${date}`;
      }
    });

    crawlBtn.addEventListener('click', async () => {
      if (isCrawling) return;
      isCrawling = true;
      crawlBtn.disabled = true;
      crawlBtnText.textContent = '수집 중...';
      crawlBtn.classList.add('loading');

      try {
        const res = await fetch(API_CRAWL, { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          showToast(data.message || '수집 완료', 'success');
          currentPage = 1;
          await loadMeta();
          rebuildSubcategoryOptions();
          await loadIdeas();
        } else {
          showToast(data.detail || '수집 실패', 'error');
        }
      } catch (e) {
        showToast('네트워크 오류', 'error');
      } finally {
        isCrawling = false;
        crawlBtn.disabled = false;
        crawlBtnText.textContent = '최신 데이터 수집';
        crawlBtn.classList.remove('loading');
      }
    });

    (async function init() {
      await loadMeta();
      await loadIdeas();
    })();
  </script>
</body>
</html>
